<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaChat Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- KaTeX for LaTeX math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        /* ==================== Auth Screen ==================== */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .auth-card h1 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .auth-card .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 24px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            color: #888;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
        }

        .auth-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-error {
            color: #f44336;
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-align: center;
            min-height: 20px;
        }

        /* ==================== App Layout ==================== */
        .app-container {
            display: flex;
            height: 100vh;
        }

        /* ==================== Sidebar ==================== */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-header .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header .user-info span {
            color: #00d4ff;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #f44336;
            padding: 6px 12px;
            font-size: 0.8rem;
            width: auto;
            border-radius: 6px;
        }

        .btn-logout:hover {
            background: rgba(244, 67, 54, 0.1);
            box-shadow: none;
            transform: none;
        }

        .btn-new-chat {
            padding: 10px 16px;
            font-size: 0.9rem;
            border-radius: 8px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .chat-item.active {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .chat-item-info {
            flex: 1;
            min-width: 0;
        }

        .chat-item-title {
            font-size: 0.9rem;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-date {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        .btn-delete-chat {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 1.1rem;
            border-radius: 4px;
            width: auto;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
        }

        .chat-item:hover .btn-delete-chat {
            opacity: 1;
        }

        .btn-delete-chat:hover {
            color: #f44336;
            background: rgba(244, 67, 54, 0.1);
            transform: none;
            box-shadow: none;
        }

        .no-chats {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 0.85rem;
        }

        /* ==================== Main Chat Area ==================== */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .chat-header h2 {
            color: #00d4ff;
            font-size: 1.2rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .message.user {
            align-self: flex-end;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #e0e0e0;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
        }

        .message.assistant p {
            margin-bottom: 0.8em;
        }

        .message.assistant p:last-child {
            margin-bottom: 0;
        }

        .message.assistant pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .message.assistant pre code {
            background: transparent;
            padding: 0;
        }

        .message.assistant ul, .message.assistant ol {
            padding-left: 1.5em;
            margin-bottom: 0.8em;
        }

        /* KaTeX math styling */
        .message.assistant .katex-display {
            margin: 0.8em 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .message.assistant .katex {
            font-size: 1.05em;
        }

        .message.assistant h1, .message.assistant h2, .message.assistant h3 {
            color: #00d4ff;
            margin: 0.6em 0 0.4em 0;
        }

        .message.assistant h1 { font-size: 1.3em; }
        .message.assistant h2 { font-size: 1.15em; }
        .message.assistant h3 { font-size: 1.05em; }

        .message.assistant strong {
            color: #fff;
        }

        .message.assistant blockquote {
            border-left: 3px solid rgba(0, 212, 255, 0.4);
            padding-left: 12px;
            margin: 0.5em 0;
            color: #b0b0b0;
        }

        .message.assistant table {
            border-collapse: collapse;
            margin: 0.8em 0;
            width: 100%;
        }

        .message.assistant th, .message.assistant td {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 10px;
            text-align: left;
        }

        .message.assistant th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
        }

        .message.assistant hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0.8em 0;
        }

        .message.error {
            align-self: center;
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            font-size: 0.85rem;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 1.1rem;
        }

        .no-chat-selected {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            font-size: 1.1rem;
            flex-direction: column;
            gap: 8px;
        }

        .no-chat-selected .icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        /* ==================== Input Area ==================== */
        .input-area {
            padding: 16px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            min-height: 44px;
            max-height: 150px;
            padding: 10px 14px;
            resize: none;
        }

        .btn-send {
            width: auto;
            padding: 10px 20px;
            white-space: nowrap;
            height: 44px;
        }

        /* ==================== Loading ==================== */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 0.85rem;
        }

        /* ==================== Scrollbar ==================== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ==================== Hidden ==================== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- ==================== Auth Screen ==================== -->
    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <h1>🤖 GigaChat Agent</h1>
            <p class="subtitle">Войдите или зарегистрируйтесь для начала работы</p>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Вход</button>
                <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Регистрация</button>
            </div>

            <div class="auth-error" id="authError"></div>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label for="authUsername">Имя пользователя</label>
                    <input type="text" id="authUsername" placeholder="Введите имя пользователя" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="authPassword">Пароль</label>
                    <input type="password" id="authPassword" placeholder="Введите пароль" required autocomplete="current-password">
                </div>

                <button type="submit" id="authBtn">Войти</button>
            </form>
        </div>
    </div>

    <!-- ==================== App Screen ==================== -->
    <div id="appScreen" class="app-container hidden">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <span>👤 <span id="displayUsername"></span></span>
                    <button class="btn-logout" onclick="logout()">Выйти</button>
                </div>
                <button class="btn-new-chat" onclick="createNewChat()">+ Новый чат</button>
            </div>
            <div class="chat-list" id="chatList">
                <div class="no-chats">Нет чатов. Создайте новый!</div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="main-area">
            <!-- No chat selected state -->
            <div class="no-chat-selected" id="noChatSelected">
                <div class="icon">💬</div>
                <div>Выберите чат или создайте новый</div>
            </div>

            <!-- Chat view -->
            <div id="chatView" class="hidden" style="display:flex; flex-direction:column; flex:1; min-height:0;">
                <div class="chat-header">
                    <h2 id="chatTitle">Чат</h2>
                </div>

                <div class="chat-messages" id="chatMessages">
                    <div class="empty-chat">Начните диалог, отправив сообщение</div>
                </div>

                <div class="input-area">
                    <div class="input-row">
                        <textarea id="messageInput" placeholder="Введите сообщение..." rows="1"
                            onkeydown="handleInputKeydown(event)"></textarea>
                        <button class="btn-send" id="sendBtn" onclick="sendMessage()">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';

        // ==================== State ====================
        let currentUser = null;   // { user_id, username }
        let currentChatId = null;
        let chatMessages = {};    // chatId -> [{role, content}]
        let isLoading = false;

        // ==================== Init ====================
        (function init() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    showApp();
                    loadChats();
                } catch {
                    localStorage.removeItem('currentUser');
                }
            }

        })();

        // ==================== Auth ====================
        let authMode = 'login';

        function switchAuthTab(tab) {
            authMode = tab;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.auth-tab[data-tab="${tab}"]`).classList.add('active');
            document.getElementById('authBtn').textContent = tab === 'login' ? 'Войти' : 'Зарегистрироваться';
            document.getElementById('authError').textContent = '';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            const errorEl = document.getElementById('authError');
            const btn = document.getElementById('authBtn');

            if (!username || !password) {
                errorEl.textContent = 'Заполните все поля';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            errorEl.textContent = '';

            try {
                const endpoint = authMode === 'login' ? '/login' : '/register';
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentUser = { user_id: data.user_id, username: data.username };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showApp();
                    loadChats();
                } else {
                    errorEl.textContent = data.detail || 'Ошибка авторизации';
                }
            } catch (error) {
                errorEl.textContent = 'Ошибка сети: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
            }
        }

        function logout() {
            currentUser = null;
            currentChatId = null;
            chatMessages = {};
            localStorage.removeItem('currentUser');
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
            document.getElementById('authUsername').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authError').textContent = '';
            // Reset chat view to default state
            showNoChatSelected();
            document.getElementById('chatList').innerHTML = '<div class="no-chats">Нет чатов. Создайте новый!</div>';
        }

        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('displayUsername').textContent = currentUser.username;
        }

        // ==================== Chat List ====================
        async function loadChats() {
            if (!currentUser) return;

            try {
                const response = await fetch(`${API_BASE_URL}/chats/${currentUser.user_id}`);
                const data = await response.json();

                if (response.ok) {
                    renderChatList(data.chats);
                }
            } catch (error) {
                console.error('Failed to load chats:', error);
            }
        }

        function renderChatList(chats) {
            const container = document.getElementById('chatList');

            if (!chats || chats.length === 0) {
                container.innerHTML = '<div class="no-chats">Нет чатов. Создайте новый!</div>';
                return;
            }

            container.innerHTML = chats.map(chat => `
                <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}"
                     onclick="selectChat(${chat.id}, '${escapeHtml(chat.title)}')"
                     data-chat-id="${chat.id}">
                    <div class="chat-item-info">
                        <div class="chat-item-title">${escapeHtml(chat.title)}</div>
                        <div class="chat-item-date">${chat.created_at || ''}</div>
                    </div>
                    <button class="btn-delete-chat" onclick="deleteChat(event, ${chat.id})" title="Удалить чат">🗑</button>
                </div>
            `).join('');
        }

        async function createNewChat() {
            if (!currentUser) return;

            try {
                const response = await fetch(`${API_BASE_URL}/chats`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.user_id, title: 'Новый чат' })
                });

                const data = await response.json();

                if (response.ok) {
                    await loadChats();
                    selectChat(data.id, data.title);
                }
            } catch (error) {
                console.error('Failed to create chat:', error);
            }
        }

        async function deleteChat(event, chatId) {
            event.stopPropagation();

            if (!confirm('Удалить этот чат?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/chats`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUser.user_id, chat_id: chatId })
                });

                if (response.ok) {
                    // Remove local messages
                    delete chatMessages[chatId];

                    if (currentChatId === chatId) {
                        currentChatId = null;
                        showNoChatSelected();
                    }

                    await loadChats();
                }
            } catch (error) {
                console.error('Failed to delete chat:', error);
            }
        }

        async function selectChat(chatId, title) {
            currentChatId = chatId;

            // Update active state in sidebar
            document.querySelectorAll('.chat-item').forEach(el => {
                el.classList.toggle('active', parseInt(el.dataset.chatId) === chatId);
            });

            // Show chat view
            document.getElementById('noChatSelected').classList.add('hidden');
            const chatView = document.getElementById('chatView');
            chatView.classList.remove('hidden');
            chatView.style.display = 'flex';

            document.getElementById('chatTitle').textContent = title;

            // Load messages from server
            await loadChatMessages(chatId);

            renderMessages();
            document.getElementById('messageInput').focus();
        }

        async function loadChatMessages(chatId) {
            try {
                const response = await fetch(`${API_BASE_URL}/chats/${chatId}/messages?user_id=${currentUser.user_id}`);
                if (response.ok) {
                    const data = await response.json();
                    chatMessages[chatId] = data.messages || [];
                }
            } catch (error) {
                console.error('Failed to load chat messages:', error);
            }
        }

        function showNoChatSelected() {
            document.getElementById('noChatSelected').classList.remove('hidden');
            const chatView = document.getElementById('chatView');
            chatView.classList.add('hidden');
            chatView.style.display = 'none';
        }

        // ==================== Messages ====================
        function renderMessages() {
            const container = document.getElementById('chatMessages');
            const messages = chatMessages[currentChatId] || [];

            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-chat">Начните диалог, отправив сообщение</div>';
                return;
            }

            container.innerHTML = messages.map(msg => {
                if (msg.role === 'user') {
                    return `<div class="message user">${escapeHtml(msg.content)}</div>`;
                } else if (msg.role === 'error') {
                    return `<div class="message error">${escapeHtml(msg.content)}</div>`;
                } else {
                    return `<div class="message assistant">${marked.parse(msg.content)}</div>`;
                }
            }).join('');

            renderMath(container);
            container.scrollTop = container.scrollHeight;
        }

        function addMessage(role, content) {
            if (!chatMessages[currentChatId]) {
                chatMessages[currentChatId] = [];
            }
            chatMessages[currentChatId].push({ role, content });
            renderMessages();
        }

        async function sendMessage() {
            if (!currentChatId || isLoading) return;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            autoResizeTextarea(input);

            addMessage('user', text);

            // Show typing indicator
            const messagesContainer = document.getElementById('chatMessages');
            const typingEl = document.createElement('div');
            typingEl.className = 'typing-indicator';
            typingEl.innerHTML = '<span class="loading"></span> Генерация ответа...';
            messagesContainer.appendChild(typingEl);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            isLoading = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE_URL}/new_message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: currentChatId,
                        user_id: currentUser.user_id,
                        text: text
                    })
                });

                const data = await response.json();

                // Remove typing indicator
                if (typingEl.parentNode) typingEl.remove();

                if (response.ok && data.gigachat_response) {
                    addMessage('assistant', data.gigachat_response);

                    // Update chat title if it's the first message
                    const messages = chatMessages[currentChatId];
                    if (messages && messages.filter(m => m.role === 'user').length === 1) {
                        const newTitle = text.substring(0, 40) + (text.length > 40 ? '...' : '');
                        document.getElementById('chatTitle').textContent = newTitle;
                        loadChats();  // Refresh sidebar
                    }
                } else {
                    addMessage('error', data.detail || 'Ошибка при получении ответа');
                }
            } catch (error) {
                if (typingEl.parentNode) typingEl.remove();
                addMessage('error', 'Ошибка сети: ' + error.message);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        // ==================== Input Handling ====================
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        const messageInput = document.getElementById('messageInput');
        if (messageInput) {
            messageInput.addEventListener('input', function() {
                autoResizeTextarea(this);
            });
        }

        function autoResizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 150) + 'px';
        }

        // ==================== Utilities ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        /**
         * Render LaTeX math expressions inside the given container using KaTeX.
         * Handles both inline ($...$) and display ($$...$$) math.
         */
        function renderMath(container) {
            if (typeof renderMathInElement === 'undefined') {
                // KaTeX auto-render not loaded yet — retry after a short delay
                setTimeout(() => renderMath(container), 200);
                return;
            }
            try {
                renderMathInElement(container, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true },
                    ],
                    throwOnError: false,
                    trust: true,
                });
            } catch (e) {
                console.warn('KaTeX renderMathInElement failed:', e);
            }
        }
    </script>
</body>
</html>
