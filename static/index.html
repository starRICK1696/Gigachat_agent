<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigaChat Agent API</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
            font-size: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .method {
            background: #4caf50;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .card h2 .method.get {
            background: #2196f3;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #e0e0e0;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .response-section {
            margin-top: 20px;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .response-header h3 {
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-badge.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
        }

        .status-badge.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .response-body {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .response-body:empty::before {
            content: 'Ответ появится здесь...';
            color: #666;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-text {
            color: #888;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .endpoint-url {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #00d4ff;
            margin-bottom: 16px;
            display: inline-block;
        }

        .history-section {
            margin-top: 30px;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }

        .history-item .timestamp {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .history-item .request {
            color: #ffc107;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .history-item .response {
            color: #4caf50;
            font-size: 0.85rem;
        }

        .clear-history {
            background: transparent;
            border: 1px solid rgba(244, 67, 54, 0.5);
            color: #f44336;
            padding: 8px 16px;
            font-size: 0.85rem;
            width: auto;
        }

        .clear-history:hover {
            background: rgba(244, 67, 54, 0.1);
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 GigaChat Agent API</h1>

        <!-- New Message Endpoint -->
        <div class="card">
            <h2><span class="method">POST</span> /new_message</h2>
            <div class="endpoint-url">POST http://localhost:8000/new_message</div>
            
            <form id="newMessageForm">
                <div class="form-group">
                    <label for="chatId">Chat ID</label>
                    <input type="number" id="chatId" name="chat_id" placeholder="Введите ID чата (например: 1)" value="1" required>
                </div>
                
                <div class="form-group">
                    <label for="messageText">Сообщение</label>
                    <textarea id="messageText" name="text" placeholder="Введите ваше сообщение..." required></textarea>
                </div>
                
                <button type="submit" id="sendBtn">Отправить сообщение</button>
            </form>

            <div class="response-section">
                <div class="response-header">
                    <h3>Ответ сервера</h3>
                    <span class="status-badge" id="statusBadge" style="display: none;"></span>
                </div>
                <div class="response-body" id="responseBody"></div>
            </div>
        </div>

        <!-- Health Check Endpoint -->
        <div class="card">
            <h2><span class="method get">GET</span> /health</h2>
            <div class="endpoint-url">GET http://localhost:8000/health</div>
            
            <button type="button" id="healthBtn">Проверить статус</button>
            
            <div class="response-section">
                <div class="response-header">
                    <h3>Статус сервера</h3>
                    <span class="status-badge" id="healthStatusBadge" style="display: none;"></span>
                </div>
                <div class="response-body" id="healthResponseBody"></div>
            </div>
        </div>

        <!-- Request History -->
        <div class="card history-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2 style="margin-bottom: 0;">📜 История запросов</h2>
                <button type="button" class="clear-history" id="clearHistoryBtn">Очистить</button>
            </div>
            <div id="historyContainer">
                <p class="info-text">История запросов пуста</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        let requestHistory = JSON.parse(localStorage.getItem('requestHistory') || '[]');

        // Render history on page load
        renderHistory();

        // New Message Form Handler
        document.getElementById('newMessageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const chatId = parseInt(document.getElementById('chatId').value);
            const text = document.getElementById('messageText').value;
            const sendBtn = document.getElementById('sendBtn');
            const responseBody = document.getElementById('responseBody');
            const statusBadge = document.getElementById('statusBadge');

            // Show loading state
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span>Отправка...';
            statusBadge.style.display = 'inline-block';
            statusBadge.className = 'status-badge pending';
            statusBadge.textContent = 'Ожидание...';
            responseBody.textContent = '';

            try {
                const startTime = Date.now();
                const response = await fetch(`${API_BASE_URL}/new_message`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: text
                    })
                });

                const duration = Date.now() - startTime;
                const data = await response.json();

                if (response.ok) {
                    statusBadge.className = 'status-badge success';
                    statusBadge.textContent = `${response.status} OK (${duration}ms)`;
                    responseBody.textContent = JSON.stringify(data, null, 2);
                    
                    // Add to history
                    addToHistory('POST /new_message', { chat_id: chatId, text }, data, true);
                } else {
                    statusBadge.className = 'status-badge error';
                    statusBadge.textContent = `${response.status} Error`;
                    responseBody.textContent = JSON.stringify(data, null, 2);
                    
                    addToHistory('POST /new_message', { chat_id: chatId, text }, data, false);
                }
            } catch (error) {
                statusBadge.className = 'status-badge error';
                statusBadge.textContent = 'Ошибка сети';
                responseBody.textContent = `Ошибка: ${error.message}\n\nУбедитесь, что сервер запущен на ${API_BASE_URL}`;
                
                addToHistory('POST /new_message', { chat_id: chatId, text }, { error: error.message }, false);
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Отправить сообщение';
            }
        });

        // Health Check Handler
        document.getElementById('healthBtn').addEventListener('click', async () => {
            const healthBtn = document.getElementById('healthBtn');
            const responseBody = document.getElementById('healthResponseBody');
            const statusBadge = document.getElementById('healthStatusBadge');

            healthBtn.disabled = true;
            healthBtn.innerHTML = '<span class="loading"></span>Проверка...';
            statusBadge.style.display = 'inline-block';
            statusBadge.className = 'status-badge pending';
            statusBadge.textContent = 'Ожидание...';

            try {
                const startTime = Date.now();
                const response = await fetch(`${API_BASE_URL}/health`);
                const duration = Date.now() - startTime;
                const data = await response.json();

                if (response.ok) {
                    statusBadge.className = 'status-badge success';
                    statusBadge.textContent = `${response.status} OK (${duration}ms)`;
                    responseBody.textContent = JSON.stringify(data, null, 2);
                } else {
                    statusBadge.className = 'status-badge error';
                    statusBadge.textContent = `${response.status} Error`;
                    responseBody.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                statusBadge.className = 'status-badge error';
                statusBadge.textContent = 'Ошибка сети';
                responseBody.textContent = `Ошибка: ${error.message}\n\nУбедитесь, что сервер запущен на ${API_BASE_URL}`;
            } finally {
                healthBtn.disabled = false;
                healthBtn.textContent = 'Проверить статус';
            }
        });

        // Clear History Handler
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            requestHistory = [];
            localStorage.setItem('requestHistory', '[]');
            renderHistory();
        });

        function addToHistory(endpoint, request, response, success) {
            const historyItem = {
                timestamp: new Date().toLocaleString('ru-RU'),
                endpoint,
                request,
                response,
                success
            };
            
            requestHistory.unshift(historyItem);
            if (requestHistory.length > 20) {
                requestHistory.pop();
            }
            
            localStorage.setItem('requestHistory', JSON.stringify(requestHistory));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            
            if (requestHistory.length === 0) {
                container.innerHTML = '<p class="info-text">История запросов пуста</p>';
                return;
            }

            container.innerHTML = requestHistory.map(item => `
                <div class="history-item" style="border-left-color: ${item.success ? '#4caf50' : '#f44336'}">
                    <div class="timestamp">${item.timestamp} - ${item.endpoint}</div>
                    <div class="request">→ ${JSON.stringify(item.request)}</div>
                    <div class="response" style="color: ${item.success ? '#4caf50' : '#f44336'}">← ${JSON.stringify(item.response).substring(0, 200)}${JSON.stringify(item.response).length > 200 ? '...' : ''}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
